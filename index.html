<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#04080a" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="canonical" href="https://solariavc.com/" />

    <title>Solaria — Quantitative investment & venture capital</title>
    <meta
      name="description"
      content="Solaria is a privately held investment firm operating the Medallion Fund (closed-end quantitative portfolio), Solaria Ventures (pre-seed and seed venture), and Solaria Research. Based in San Diego, California."
    />
    <meta name="author" content="Solaria Capital, LLC" />
    <meta name="robots" content="index, follow, max-image-preview:large" />

    <!-- Open Graph (social previews + some Google contexts) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Solaria" />
    <meta property="og:title" content="Solaria — Quantitative investment & venture capital" />
    <meta
      property="og:description"
      content="The Medallion Fund (closed-end quantitative portfolio), Solaria Ventures (pre-seed and seed venture), and Solaria Research. San Diego, USA."
    />
    <meta property="og:url" content="https://solariavc.com/" />
    <meta property="og:image" content="https://solariavc.com/logo.png" />
    <meta property="og:image:alt" content="Solaria logo — emerald S with upward arrow" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Solaria — Quantitative investment & venture capital" />
    <meta
      name="twitter:description"
      content="The Medallion Fund, Solaria Ventures, and Solaria Research. Based in San Diego."
    />
    <meta name="twitter:image" content="https://solariavc.com/logo.png" />

    <!-- Structured data: tells Google exactly what this entity is -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FinancialService",
        "name": "Solaria",
        "alternateName": ["Solaria Capital", "Solaria Capital, LLC"],
        "url": "https://solariavc.com",
        "logo": "https://solariavc.com/logo.png",
        "image": "https://solariavc.com/logo.png",
        "description": "Solaria is a privately held investment firm operating the Medallion Fund (closed-end quantitative portfolio), Solaria Ventures (pre-seed and seed venture), and Solaria Research.",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "San Diego",
          "addressRegion": "CA",
          "addressCountry": "US"
        },
        "foundingDate": "2026",
        "founders": [
          { "@type": "Person", "name": "Johnson Jiang" },
          { "@type": "Person", "name": "Karl Li" }
        ],
        "areaServed": "United States",
        "knowsAbout": [
          "Quantitative investment management",
          "Venture capital",
          "Statistical arbitrage",
          "Frontier technology investing",
          "Pre-seed venture",
          "Seed venture",
          "Closed-end fund"
        ],
        "subOrganization": [
          {
            "@type": "Organization",
            "name": "The Medallion Fund",
            "description": "Closed-end quantitative portfolio."
          },
          {
            "@type": "Organization",
            "name": "Solaria Ventures",
            "description": "Pre-seed and seed venture capital arm."
          },
          {
            "@type": "Organization",
            "name": "Solaria Research",
            "description": "Quantitative research published openly."
          }
        ]
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-ink-950 text-white antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
